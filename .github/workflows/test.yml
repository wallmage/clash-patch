name: Test

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  macos:
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1.319.0
        with:
          ruby-version: "3.3"
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
      - name: Ruby 3.3 regression suite and production coverage
        run: ruby tests/coverage_ruby.rb
      - name: Ruby 3.3 skill contract suite
        run: ruby tests/test_skill_contract.rb
      - name: Safety mutation checks
        run: ruby tests/test_mutation_safety.rb
      - name: macOS command wrapper behavior
        run: ruby tests/test_macos_wrappers.rb
      - name: Windows engine suite
        run: node --experimental-test-coverage --test --test-coverage-include=clash-patch/scripts/windows/clash_verge_global.js --test-coverage-lines=100 --test-coverage-functions=100 --test-coverage-branches=80 tests/test_windows_patcher.js
      - name: Generated policy parity
        run: ruby tests/generate_windows_policy.rb --check
      - name: Ruby 3.3 syntax checks
        run: |
          ruby -c clash-patch/scripts/macos/patch_profiles.rb
          ruby -c clash-patch/scripts/macos/verify_routes.rb
          node --check clash-patch/scripts/windows/clash_verge_global.js
      - name: Confirm the supported system Ruby
        run: /usr/bin/ruby -e 'abort "expected Ruby 2.6" unless RUBY_VERSION.start_with?("2.6.")'
      - name: Ruby regressions on the production runtime
        run: /usr/bin/ruby tests/test_macos_patcher.rb
      - name: Contract regressions on the production runtime
        run: /usr/bin/ruby tests/test_skill_contract.rb
      - name: Command wrappers on the production runtime
        run: /usr/bin/ruby tests/test_macos_wrappers.rb
      - name: macOS syntax checks
        run: |
          /usr/bin/ruby -c clash-patch/scripts/macos/patch_profiles.rb
          /usr/bin/ruby -c clash-patch/scripts/macos/verify_routes.rb
          sh -n clash-patch/scripts/install_macos.sh
          sh -n clash-patch/scripts/uninstall_macos.sh
      - name: Source tree whitespace checks
        env:
          PUSH_BASE_SHA: ${{ github.event.before }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          git diff --check
          base_sha="${PR_BASE_SHA:-$PUSH_BASE_SHA}"
          if [ -n "$base_sha" ] && [ "$base_sha" != "0000000000000000000000000000000000000000" ]; then
            git diff --check "$base_sha" HEAD
          else
            git show --check --format= HEAD
          fi

  macos-production-probes:
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1.319.0
        with:
          ruby-version: "3.3"
      - name: Fault-inject production commit, kill, alias, process, and uninstall boundaries
        run: ruby tests/run_macos_production_probes.rb

  mihomo:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            architecture: arm64
            minimum_sha256: "3617c9d8a5a55aecfe1ebd0f55ff59f2706c8ad68fd65c6c4e5f7cf2b74263f1"
            current_sha256: "4dc25df9e899f14161911302a8ee5fc9e202ed9c976fc405bf82c50ff27466ca"
          - runner: macos-15-intel
            architecture: amd64
            minimum_sha256: "5392bea435a1c4b0a496571daafa977f744207cfafac18fb78a9b7d0747585c2"
            current_sha256: "b57fec2e38462532fe75252792b355b99db16b0b8ea2d6bdf0cd8bc7ddacb9d2"
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1.319.0
        with:
          ruby-version: "3.3"
      - name: Download and verify pinned Mihomo versions
        env:
          MIHOMO_ARCHITECTURE: ${{ matrix.architecture }}
          MIHOMO_MINIMUM_SHA256: ${{ matrix.minimum_sha256 }}
          MIHOMO_CURRENT_SHA256: ${{ matrix.current_sha256 }}
        run: |
          for entry in \
            "v1.19.27:$MIHOMO_MINIMUM_SHA256:MINIMUM" \
            "v1.19.29:$MIHOMO_CURRENT_SHA256:CURRENT"
          do
            IFS=: read -r version expected label <<EOF
          $entry
          EOF
            archive="$RUNNER_TEMP/mihomo-$label.gz"
            binary="$RUNNER_TEMP/mihomo-$label"
            curl --fail --location --retry 3 --connect-timeout 15 --max-time 300 \
              --output "$archive" \
              "https://github.com/MetaCubeX/mihomo/releases/download/$version/mihomo-darwin-$MIHOMO_ARCHITECTURE-$version.gz"
            echo "$expected  $archive" | shasum -a 256 --check
            gzip --decompress --stdout "$archive" > "$binary"
            chmod 700 "$binary"
            echo "MIHOMO_${label}_PATH=$binary" >> "$GITHUB_ENV"
          done
      - name: Validate all profiles with minimum Mihomo
        env:
          CLASH_PATCH_REQUIRE_REAL_MIHOMO: "1"
        run: CLASH_PATCH_TEST_MIHOMO="$MIHOMO_MINIMUM_PATH" ruby tests/test_macos_patcher.rb --name test_generated_profile_passes_installed_mihomo_validation
      - name: Validate all profiles with current Mihomo
        env:
          CLASH_PATCH_REQUIRE_REAL_MIHOMO: "1"
        run: CLASH_PATCH_TEST_MIHOMO="$MIHOMO_CURRENT_PATH" ruby tests/test_macos_patcher.rb --name test_generated_profile_passes_installed_mihomo_validation

  windows-installer-powershell-5:
    runs-on: windows-2022
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
      - name: PowerShell 5.1 installer, uninstaller, and route regressions
        shell: powershell
        run: |
          $receipt = Join-Path $env:RUNNER_TEMP "clash-patch-windows-full-5.json"
          Remove-Item -LiteralPath $receipt -Force -ErrorAction SilentlyContinue
          $runtime = (Get-Command powershell.exe).Source
          & $runtime -NoLogo -NoProfile -File ./tests/test_windows_installer.ps1 -PowerShellPath $runtime -ExpectedPSEdition Desktop -ExpectedPSMajor 5 -CompletionReceiptPath $receipt
          if ($LASTEXITCODE -ne 0) { throw "Windows full suite failed with exit code $LASTEXITCODE" }
          if (-not (Test-Path -LiteralPath $receipt -PathType Leaf)) { throw "Windows full suite did not produce its completion receipt" }
          $completed = Get-Content -LiteralPath $receipt -Raw | ConvertFrom-Json
          if ($completed.Mode -ne "Full" -or $completed.PSEdition -ne "Desktop" -or [int]$completed.PSMajor -ne 5) {
            throw "Windows full suite produced an invalid completion receipt"
          }

  windows-installer-powershell-7:
    runs-on: windows-2022
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
      - name: PowerShell 7 installer, uninstaller, and route regressions
        shell: pwsh
        run: |
          $receipt = Join-Path $env:RUNNER_TEMP "clash-patch-windows-full-7.json"
          Remove-Item -LiteralPath $receipt -Force -ErrorAction SilentlyContinue
          $runtime = (Get-Command pwsh.exe).Source
          & $runtime -NoLogo -NoProfile -File ./tests/test_windows_installer.ps1 -PowerShellPath $runtime -ExpectedPSEdition Core -ExpectedPSMajor 7 -CompletionReceiptPath $receipt
          if ($LASTEXITCODE -ne 0) { throw "Windows full suite failed with exit code $LASTEXITCODE" }
          if (-not (Test-Path -LiteralPath $receipt -PathType Leaf)) { throw "Windows full suite did not produce its completion receipt" }
          $completed = Get-Content -LiteralPath $receipt -Raw | ConvertFrom-Json
          if ($completed.Mode -ne "Full" -or $completed.PSEdition -ne "Core" -or [int]$completed.PSMajor -ne 7) {
            throw "Windows full suite produced an invalid completion receipt"
          }

  windows-mihomo:
    strategy:
      fail-fast: false
      matrix:
        include:
          - version: v1.19.27
            sha256: "34b4c5bc0c176eebd298f6624aa23ea41985a2c54efb04eb0e9c4542e45190ee"
            executable: powershell.exe
            edition: Desktop
            major: 5
          - version: v1.19.29
            sha256: "1a8520cfe425441eba3eba8623b27b985020031243fe1ecaa1af2b92358a03f9"
            executable: powershell.exe
            edition: Desktop
            major: 5
          - version: v1.19.27
            sha256: "34b4c5bc0c176eebd298f6624aa23ea41985a2c54efb04eb0e9c4542e45190ee"
            executable: pwsh.exe
            edition: Core
            major: 7
          - version: v1.19.29
            sha256: "1a8520cfe425441eba3eba8623b27b985020031243fe1ecaa1af2b92358a03f9"
            executable: pwsh.exe
            edition: Core
            major: 7
    runs-on: windows-2022
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
      - name: Download and verify official Windows Mihomo
        shell: powershell
        env:
          MIHOMO_VERSION: ${{ matrix.version }}
          MIHOMO_SHA256: ${{ matrix.sha256 }}
        run: |
          $archive = Join-Path $env:RUNNER_TEMP "mihomo-windows-amd64.zip"
          curl.exe --fail --location --retry 3 --connect-timeout 15 --max-time 300 `
            --output $archive `
            "https://github.com/MetaCubeX/mihomo/releases/download/$env:MIHOMO_VERSION/mihomo-windows-amd64-$env:MIHOMO_VERSION.zip"
          if ($LASTEXITCODE -ne 0) { throw "Mihomo download failed" }
          $actual = (Get-FileHash -LiteralPath $archive -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actual -cne $env:MIHOMO_SHA256) { throw "Mihomo checksum mismatch" }
          $destination = Join-Path $env:RUNNER_TEMP "mihomo-windows-amd64"
          Expand-Archive -LiteralPath $archive -DestinationPath $destination
          $core = @(Get-ChildItem -LiteralPath $destination -Filter "mihomo*.exe" -File -Recurse)
          if ($core.Count -ne 1) { throw "Mihomo archive did not contain exactly one executable" }
      - name: Validate all Windows profiles through the public installer
        shell: powershell
        run: |
          $destination = Join-Path $env:RUNNER_TEMP "mihomo-windows-amd64"
          $core = @(Get-ChildItem -LiteralPath $destination -Filter "mihomo*.exe" -File -Recurse)
          if ($core.Count -ne 1) { throw "Mihomo executable is missing before validation" }
          $targetPowerShell = (Get-Command '${{ matrix.executable }}').Source
          & $targetPowerShell -NoLogo -NoProfile -File ./tests/test_windows_installer.ps1 `
            -PowerShellPath $targetPowerShell `
            -ExpectedPSEdition '${{ matrix.edition }}' `
            -ExpectedPSMajor ${{ matrix.major }} `
            -RealMihomoPaths @($core[0].FullName) `
            -RealMihomoOnly
          if ($LASTEXITCODE -ne 0) { throw "Windows real Mihomo suite failed" }
