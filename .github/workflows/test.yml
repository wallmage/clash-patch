name: Test

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ruby-and-node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Ruby regression suite
        run: ruby tests/test_macos_patcher.rb
      - name: Skill contract suite
        run: ruby tests/test_skill_contract.rb
      - name: Windows engine suite
        run: node --test tests/test_windows_patcher.js
      - name: Generated policy parity
        run: ruby tests/generate_windows_policy.rb --check
      - name: Syntax checks
        run: |
          ruby -c clash-patch/scripts/macos/patch_profiles.rb
          node --check clash-patch/scripts/windows/clash_verge_global.js
          sh -n clash-patch/scripts/install_macos.sh
          sh -n clash-patch/scripts/uninstall_macos.sh

  windows-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: PowerShell installer and uninstaller regressions
        shell: pwsh
        run: ./tests/test_windows_installer.ps1 -PowerShellPath (Get-Command pwsh).Source
